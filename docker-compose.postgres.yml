services:
  postgres:
    image: postgres:16-alpine
    container_name: felipe-janeth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: felipe_janeth
      POSTGRES_USER: felipe
      POSTGRES_PASSWORD: felipe123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U felipe -d felipe_janeth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
